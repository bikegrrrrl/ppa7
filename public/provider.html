<!-- public/provider.html -->
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advising Calendar</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>


 <h1>Create an advising appointment</h1>

 <div id="message"></div>

 <section id="createSlotPanel">
    

    <label>Start time</label>
       <input id="startTimeInput" type="datetime-local">
    

    <label>End time</label>
        <input id="endTimeInput" type="datetime-local">
    
    <label>Status</label>
    <select id="myStatus" name="myStatus" type="text">
            <option value="" disabled selected>Select status</option>
            <option value="Available">Available</option>
            <option value="Booked">Booked</option>
    </select>
    <label>Student name</label>
        <input id="myName" type="text" placeholder="your name">

    <button id="createSlotButton">Create Slot</button>
 </section>

 <section>
    
    <!-- Calendar month title-->
<div class="calendar-header">

  <div class="calendar-nav">
    <button id="prevMonth">◀</button>
    <h2 id="monthTitle"></h2>
    <button id="nextMonth">▶</button>
  </div>

</div>


    <div id="calendarGrid"></div>
 </section>


<!--  Appt modal with one form for all changes -->
<div id="appointmentModal" class="modal">
  <div class="modal-content">

    <h2 class="modal-title">Appointment Details</h2>

    <form id="appointmentForm">

    <div class="modal-body">

      <label>
        Start
        <input id="editStartTime" type="datetime-local" required>
      </label>

      <label>
        End
        <input id="editEndTime" type="datetime-local" required>
      </label>

      <label>Status:</label>
      <select id="editStatus">
          <option value="Available">Available</option>
          <option value="Booked">Booked</option>
      </select>

      <label>
        Name
        <input id="editName" type="text">
      </label>

    </div>

    <div class="modal-actions">

      <button type="button" id="saveBtn">
        Save Changes
      </button>

      <button id="deleteBtn">
        Delete Appointment
      </button>

    </div>
    
    </form>
  </div>
</div>


    <!-- Script runs after the DOM exists -->
    <script src="provider.js"></script>
    

</body>



</html>
